server.port=8081

eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka

spring.datasource.url=jdbc:postgresql://postgres:5432/users
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.kafka.bootstrap-servers=kafka:9092

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.notificationService.register-health-indicator=true
resilience4j.circuitbreaker.instances.notificationService.sliding-window-size=5
resilience4j.circuitbreaker.instances.notificationService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.notificationService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.notificationService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.notificationService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.notificationService.automatic-transition-from-open-to-half-open-enabled=true