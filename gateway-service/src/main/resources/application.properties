spring.application.name=gateway-service

server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.mvc.routes[0].id=user-service
spring.cloud.gateway.mvc.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/users/**

spring.cloud.gateway.mvc.routes[1].id=notification-service
spring.cloud.gateway.mvc.routes[1].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/notifications/**